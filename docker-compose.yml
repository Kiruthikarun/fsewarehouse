# Local Postgres for development. The deployed transactional DB is Cloud SQL
# for PostgreSQL — see README. I chose local Postgres (not SQLite) so dev/prod
# stay at parity: native enums, types, and Prisma migrations behave identically.
services:
  postgres:
    image: postgres:16-alpine
    container_name: t3c-warehouse-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: warehouse
      POSTGRES_PASSWORD: warehouse
      POSTGRES_DB: warehouse
    # Host port 5433 (not 5432) to avoid clashing with any Postgres already
    # running locally. Inside the container it's still 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U warehouse"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
